services:
  - type: web
    name: audio-emotion-api
    env: python
    rootDir: deployment_web/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://mahmoudalsalahy.github.io
